name: iOS Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_OPTS: "-Xmx4g -XX:+UseG1GC"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dkotlin.incremental=false"

defaults:
  run:
    working-directory: "frontend/Temu Belajar"

jobs:
  build-ios:
    name: Build iOS Framework & App
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Toolchain ─────────────────────────────────────────────────────────
      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── 3. Caches ────────────────────────────────────────────────────────────
      - name: Cache Gradle wrappers & caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/Temu Belajar/gradle/libs.versions.toml', 'frontend/Temu Belajar/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Kotlin/Native compiler toolchain (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('frontend/Temu Belajar/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      # ── 4. Prepare Gradle ────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Remove hardcoded local Java home from gradle.properties
        # The repo has org.gradle.java.home pointing to the developer's machine.
        # Strip it so the CI-provided JAVA_HOME (set by setup-java) is used.
        run: |
          grep -v 'org.gradle.java.home' gradle.properties > gradle.properties.tmp
          mv gradle.properties.tmp gradle.properties
          echo "=== gradle.properties after patch ==="
          cat gradle.properties

      # ── 5. Kotlin/Native framework builds ────────────────────────────────────
      - name: Build iOS Arm64 Release framework
        run: |
          ./gradlew :composeApp:linkReleaseFrameworkIosArm64 \
            --no-daemon \
            --stacktrace

      - name: Build iOS Simulator Arm64 Debug framework
        run: |
          ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 \
            --no-daemon \
            --stacktrace

      # ── 6. Kotlin tests (iOS Simulator) ──────────────────────────────────────
      - name: Run Kotlin tests on iOS Simulator target
        # May have zero tests; continue-on-error prevents a false-red build.
        continue-on-error: true
        run: |
          ./gradlew :composeApp:iosSimulatorArm64Test \
            --no-daemon \
            --continue \
            --stacktrace

      # ── 7. Xcode build preparation ───────────────────────────────────────────
      - name: Expose simulator framework to Xcode framework search path
        # Xcode resolves FRAMEWORK_SEARCH_PATHS as:
        #   $(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        # We mirror the simulator framework there so xcodebuild can find it when
        # OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES skips the Gradle build phase.
        run: |
          SDK_VERSION=$(xcrun --sdk iphonesimulator --show-sdk-version)
          SDK_NAME="iphonesimulator${SDK_VERSION}"
          DEST_DIR="composeApp/build/xcode-frameworks/Debug/${SDK_NAME}"
          SRC_FRAMEWORK="composeApp/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework"

          echo "SDK version  : ${SDK_VERSION}"
          echo "SDK name     : ${SDK_NAME}"
          echo "Framework src: ${SRC_FRAMEWORK}"
          echo "Placing into : ${DEST_DIR}/"

          mkdir -p "${DEST_DIR}"
          cp -R "${SRC_FRAMEWORK}" "${DEST_DIR}/"
          echo "✅  Framework search-path ready"
          ls -la "${DEST_DIR}/"

      # ── 8. Xcode build ───────────────────────────────────────────────────────
      - name: Build Xcode project for iOS Simulator
        # OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES  – skips the "Compile Kotlin
        # Framework" shell-script build phase so Gradle is not invoked again.
        # CODE_SIGN_* flags disable signing – not needed for simulator builds.
        run: |
          set -o pipefail
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            TEAM_ID="" \
            OTHER_CODE_SIGN_FLAGS="--keychain /Library/Keychains/System.keychain" \
            build \
            | tee xcodebuild.log \
            | grep -E '^(Build|CompileSwift|error:|warning:|note:|\*\* BUILD)' \
            || true
        continue-on-error: false

      - name: Show Xcode build log tail on failure
        if: failure()
        run: tail -200 xcodebuild.log || true

      # ── 9. Artifacts ─────────────────────────────────────────────────────────
      - name: Upload iOS Arm64 Release framework
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ComposeApp-iOS-Framework-arm64-${{ github.sha }}
          path: "frontend/Temu Belajar/composeApp/build/bin/iosArm64/releaseFramework/ComposeApp.framework"
          retention-days: 7
          if-no-files-found: error

      - name: Upload iOS Simulator Arm64 Debug framework
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ComposeApp-iOS-Framework-simulator-${{ github.sha }}
          path: "frontend/Temu Belajar/composeApp/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework"
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Xcode build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xcodebuild-log-${{ github.sha }}
          path: "frontend/Temu Belajar/xcodebuild.log"
          retention-days: 3
          if-no-files-found: ignore
