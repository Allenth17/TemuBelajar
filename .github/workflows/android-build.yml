name: Android Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_OPTS: "-Xmx4g -XX:+UseG1GC"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dkotlin.incremental=false"

defaults:
  run:
    working-directory: "frontend/Temu Belajar"

jobs:
  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Toolchain ─────────────────────────────────────────────────────────
      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # ── 3. Caches ────────────────────────────────────────────────────────────
      - name: Cache Gradle wrappers & caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/Temu Belajar/gradle/libs.versions.toml', 'frontend/Temu Belajar/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Prepare Gradle ────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Remove hardcoded local Java home from gradle.properties
        # The repo has org.gradle.java.home pointing to the developer's machine.
        # Strip it so the CI-provided JAVA_HOME (set by setup-java) is used.
        run: |
          grep -v 'org.gradle.java.home' gradle.properties > gradle.properties.tmp
          mv gradle.properties.tmp gradle.properties
          echo "=== gradle.properties after patch ==="
          cat gradle.properties

      # ── 5. Build ─────────────────────────────────────────────────────────────
      - name: Build Android Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug \
            --no-daemon \
            --stacktrace

      # ── 6. Post-build info ───────────────────────────────────────────────────
      - name: Display APK info
        run: |
          APK_PATH=$(find composeApp/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "${APK_PATH}" ]; then
            echo "✅  APK built: ${APK_PATH}"
            ls -lh "${APK_PATH}"
          else
            echo "❌  No APK found under composeApp/build/outputs/apk/debug/"
            exit 1
          fi

      # ── 7. Artifacts ─────────────────────────────────────────────────────────
      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TemuBelajar-Android-Debug-${{ github.sha }}
          path: "frontend/Temu Belajar/composeApp/build/outputs/apk/debug/*.apk"
          retention-days: 7
          if-no-files-found: error

      - name: Upload build reports (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-build-reports-${{ github.sha }}
          path: |
            frontend/Temu Belajar/composeApp/build/reports/
            frontend/Temu Belajar/build/reports/
          retention-days: 3
          if-no-files-found: ignore
